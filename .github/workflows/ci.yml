name: CI

# Userspace builds on every PR + push. The umai-kernel crate is built
# separately via Dockerfile.ebpf in the release pipeline (release.yml,
# tag-triggered) because its bpfel-unknown-none target needs a pinned
# nightly + bpf-linker + LLVM 20 toolchain that takes ~5 min to set up
# and shouldn't gate every commit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  userspace:
    name: Build + test userspace
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Build (default features = cloud)
        run: cargo build --release --workspace --exclude umai-kernel

      - name: Build (CE feature)
        run: cargo build --release -p umai-loader --no-default-features --features ce

      - name: Test
        run: cargo test --workspace --exclude umai-kernel

      # Lint + format are informational, not gating. Code-review catches
      # the things that matter; we don't want a stray clippy::needless_pass_by_value
      # blocking a security fix.
      - name: Clippy (informational)
        continue-on-error: true
        run: cargo clippy --workspace --exclude umai-kernel

      - name: Rustfmt check (informational)
        continue-on-error: true
        run: cargo fmt --all -- --check
